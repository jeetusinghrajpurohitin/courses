<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  font-family: 'Segoe UI', Arial;
}

/* FULL WIDTH */
.container {
  width: 100%;
  margin: 0;
  padding: 10px 0;
}

/* BUTTONS */
.btn-row {
  display: flex;
  gap: 12px;
  margin-bottom: 15px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.9rem;
}

/* SAME COLOR STYLE */
.primary {
  background: #1f7a6b;
  color: white;
  border: none;
}

.outline {
  background: transparent;
  color: #1f7a6b;
  border: 2px solid #1f7a6b;
}

/* TABLE */
.table-wrap {
  border: 1px solid #eee;
  border-radius: 8px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f4f4f4;
  padding: 10px;
  font-size: 0.75rem;
  text-align: left;
}

td {
  padding: 12px;
  border-top: 1px solid #eee;
  font-size: 0.85rem;
}

.badge-ug {
  background: #eaf2ff;
  color: #3a6ea5;
  padding: 3px 8px;
  border-radius: 10px;
}

.badge-pg {
  background: #e9f8ef;
  color: #2e7d52;
  padding: 3px 8px;
  border-radius: 10px;
}

.empty {
  text-align: center;
  padding: 30px;
  color: #888;
}
</style>
</head>

<body>

<div class="container">

<div class="btn-row">
  <button class="btn primary" onclick="loadCourses()">Explore Courses</button>
  <button class="btn outline" onclick="clearTable()">Clear</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>#</th>
<th>Course</th>
<th>Level</th>
<th>Department</th>
<th>Duration</th>
<th>Seats</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td colspan="6" class="empty">
Click <b>Explore Courses</b>
</td>
</tr>
</tbody>
</table>
</div>

</div>

<script>
const courses = [
 {id:1,name:'B.Des – Communication Design',level:'UG',dept:'Design',dur:'4 Years',seats:60},
 {id:2,name:'B.Des – Fashion Design',level:'UG',dept:'Design',dur:'4 Years',seats:60},
 {id:3,name:'BBA',level:'UG',dept:'Business',dur:'3 Years',seats:120},
 {id:4,name:'MBA',level:'PG',dept:'Business',dur:'2 Years',seats:60},
 {id:5,name:'B.Tech CSE',level:'UG',dept:'Technology',dur:'4 Years',seats:120},
 {id:6,name:'B.Tech Mechanical',level:'UG',dept:'Technology',dur:'4 Years',seats:60},
 {id:7,name:'LLB',level:'UG',dept:'Law',dur:'5 Years',seats:60},
 {id:8,name:'BA Mass Communication',level:'UG',dept:'Liberal Arts',dur:'3 Years',seats:60},
 {id:9,name:'BDS',level:'UG',dept:'Dentistry',dur:'5 Years',seats:100}
];

function loadCourses(){
  let tbody = document.getElementById("tableBody");

  tbody.innerHTML = courses.map(c=>`
  <tr>
    <td>${c.id}</td>
    <td>${c.name}</td>
    <td><span class="badge-${c.level.toLowerCase()}">${c.level}</span></td>
    <td>${c.dept}</td>
    <td>${c.dur}</td>
    <td>${c.seats}</td>
  </tr>
  `).join('');
}

function clearTable(){
  document.getElementById("tableBody").innerHTML =
  `<tr><td colspan="6" class="empty">Click <b>Explore Courses</b></td></tr>`;
}
</script>

</body>
</html>
